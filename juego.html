<script>
// ===================================
// ⚙️ CONFIGURACIÓN: Modifica estas variables
// según cómo funcione tu juego
// ===================================

// ¿Cómo se gana tu tutorial?
// Opción A: Por vida/health (cuando la vida del rival llega a 0)
// Opción B: Por puntuación
// Opción C: Manual con botón

// Si tu script.js ya detecta cuándo gana, 
// llama a mostrarBotonCompletar() desde ahí.

function mostrarBotonCompletar() {
  const btn = document.getElementById('btn-completar-tutorial');
  if (btn) {
    btn.style.display = 'block';
    btn.classList.add('visible');
    
    // Efecto de aparición
    setTimeout(() => {
      btn.style.opacity = '1';
      btn.style.transform = 'translateY(0)';
    }, 100);
  }
}

// ===================================
// ✅ FUNCIÓN PRINCIPAL: Completar Tutorial
// ===================================
async function completarEsteTutorial() {
  const btn = document.getElementById('btn-completar-tutorial');
  
  // Deshabilitar botón mientras procesa
  if (btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Guardando...';
  }

  try {
    // Llamar a la función de niveles.js para guardar progreso
    const guardado = await completarNivel(0); // 0 = tutorial
    
    if (guardado) {
      // Éxito: Redirigir a niveles después de ver el alerta
      if (btn) {
        btn.textContent = '✅ ¡Completado!';
        btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc66)';
      }
      
      // Redirigir después de 2 segundos (tiempo para leer el alerta)
      setTimeout(() => {
        window.location.href = 'niveles.html';
      }, 2000);
      
    } else {
      // Error guardando, pero igual redirigir
      if (btn) {
        btn.textContent = '⚠️ Error, continuar...';
      }
      setTimeout(() => {
        window.location.href = 'niveles.html';
      }, 1500);
    }
    
  } catch (error) {
    console.error('Error completando tutorial:', error);
    if (btn) {
      btn.disabled = false;
      btn.textContent = '✅ Tutorial Completado - Reintentar';
    }
  }
}

/* ===================================

.btn-completar-tutorial {

.btn-completar-tutorial.visible {

.btn-completar-tutorial:hover:not(:disabled) {

/* Animación de pulso para atraer atención */
